<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sky Box Hoyo 18 · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-950:#081a30; --navy-800:#0f2a4a; --navy-700:#1b3c61;
    --cream:#f5f0e6; --sand:#e8ddc8; --wood:#8a6a45; --ocean:#3f7f92;
    --ink:#16232f; --white:#ffffff;
    --radius-s:10px; --radius-m:16px; --radius-l:24px;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--cream); color:var(--ink);
    font-family:'Work Sans', sans-serif; -webkit-font-smoothing:antialiased;
    padding-bottom:40px;
  }
  h1,h2,.display{font-family:'Fraunces', serif; font-weight:600; margin:0;}
  .wrap{max-width:640px; margin:0 auto; padding:0 16px;}
  button{font-family:inherit;}

  /* ---------- Login gate ---------- */
  #loginScreen{
    min-height:100dvh;
    background:linear-gradient(180deg, var(--navy-950), var(--navy-800));
    color:var(--white);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .login-card{max-width:340px; width:100%; text-align:center;}
  .login-card h1{font-size:1.7rem; margin-bottom:6px;}
  .login-card p{font-size:13.5px; color:rgba(245,240,230,0.6); margin-bottom:26px;}
  .login-card input{
    width:100%; padding:14px 16px; border-radius:999px; border:none;
    background:rgba(255,255,255,0.1); color:var(--white); font-size:16px;
    text-align:center; letter-spacing:0.05em;
  }
  .login-card input::placeholder{color:rgba(255,255,255,0.4);}
  .login-card button{
    width:100%; margin-top:14px; padding:14px; border-radius:999px; border:none;
    background:var(--ocean); color:var(--white); font-weight:700; font-size:15px; cursor:pointer;
    transition:transform 150ms var(--ease);
  }
  .login-card button:active{transform:scale(0.98);}
  .login-error{color:#e8a49c; font-size:13px; margin-top:12px; min-height:16px;}

  /* ---------- App shell ---------- */
  #appScreen{display:none;}
  header.appbar{
    background:var(--navy-950); color:var(--white);
    padding:18px 0 14px; position:sticky; top:0; z-index:10;
  }
  header.appbar .wrap{display:flex; align-items:center; justify-content:space-between;}
  header.appbar h1{font-size:1.2rem;}
  .logout-link{color:rgba(245,240,230,0.5); font-size:12.5px; background:none; border:none; cursor:pointer;}

  .stats-row{display:flex; gap:10px; margin:16px 0;}
  .stat{
    flex:1; background:var(--white); border-radius:var(--radius-m);
    padding:14px; text-align:center; border:1px solid rgba(22,35,47,0.07);
  }
  .stat .num{font-family:'Fraunces', serif; font-size:1.6rem; font-weight:600; color:var(--navy-800);}
  .stat .lbl{font-size:11px; color:rgba(22,35,47,0.5); margin-top:2px;}

  .date-tabs{display:flex; gap:8px; margin:16px 0;}
  .date-tab{
    flex:1; min-width:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    padding:10px 4px 8px; border-radius:var(--radius-m); border:1.5px solid var(--sand);
    background:var(--white); cursor:pointer;
    transition:all 200ms var(--ease);
  }
  .date-tab .tab-name{font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:rgba(22,35,47,0.5);}
  .date-tab .tab-num{font-family:'Fraunces', serif; font-size:19px; font-weight:600; color:var(--navy-800); line-height:1.1;}
  .date-tab.active{background:var(--navy-800); border-color:var(--navy-800);}
  .date-tab.active .tab-name{color:rgba(245,240,230,0.75);}
  .date-tab.active .tab-num{color:var(--white);}

  .search-box{
    width:100%; padding:12px 16px; border-radius:999px; border:1.5px solid var(--sand);
    background:var(--white); font-size:15px; margin-bottom:16px;
  }

  .res-card{
    background:var(--white); border-radius:var(--radius-m);
    border:1px solid rgba(22,35,47,0.07);
    padding:16px; margin-bottom:10px;
    display:flex; align-items:center; gap:12px;
  }
  .res-card.checked-in{border-left:4px solid var(--ocean);}
  .res-main{flex:1; min-width:0;}
  .res-name{font-weight:700; font-size:15px; color:var(--navy-800);}
  .res-meta{font-size:13px; color:rgba(22,35,47,0.6); margin-top:3px;}
  .res-actions{display:flex; gap:8px; flex-shrink:0;}
  .icon-btn{
    width:42px; height:42px; border-radius:50%; border:1.5px solid var(--sand);
    background:var(--cream); display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform 150ms var(--ease), background 150ms var(--ease);
  }
  .icon-btn:active{transform:scale(0.92);}
  .icon-btn.wa{border-color:#25D366; color:#1a8c48;}
  .checkin-btn{
    padding:10px 16px; border-radius:999px; border:none;
    background:var(--sand); color:var(--navy-800); font-size:13px; font-weight:700;
    cursor:pointer; white-space:nowrap; transition:all 200ms var(--ease);
  }
  .checkin-btn.done{background:var(--ocean); color:var(--white);}

  .empty-state{
    text-align:center; padding:48px 20px; color:rgba(22,35,47,0.45); font-size:14px;
  }

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--navy-950); color:var(--white); padding:12px 20px; border-radius:999px;
    font-size:13.5px; opacity:0; transition:all 250ms var(--ease); pointer-events:none; z-index:50;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<section id="loginScreen">
  <div class="login-card">
    <h1>Hoyo 18</h1>
    <p>Panel del equipo: ingresá la contraseña del evento</p>
    <input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="off" />
    <button id="loginBtn">Entrar</button>
    <p class="login-error" id="loginError"></p>
  </div>
</section>

<section id="appScreen">
  <header class="appbar">
    <div class="wrap">
      <h1>Reservas · Hoyo 18</h1>
      <button class="logout-link" id="logoutBtn">Salir</button>
    </div>
  </header>

  <div class="wrap">
    <div class="stats-row">
      <div class="stat"><div class="num" id="statTotal">–</div><div class="lbl">reservas</div></div>
      <div class="stat"><div class="num" id="statGuests">–</div><div class="lbl">personas</div></div>
      <div class="stat"><div class="num" id="statCheckedIn">–</div><div class="lbl">llegaron</div></div>
    </div>

    <div class="date-tabs" id="dateTabs"></div>
    <input type="text" class="search-box" id="searchBox" placeholder="Buscar por nombre..." />

    <div id="resList"></div>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
const CONFIG = {
  DATES: [
    { value: "2026-07-16", label: "Jue 16" },
    { value: "2026-07-17", label: "Vie 17" },
    { value: "2026-07-18", label: "Sáb 18" },
    { value: "2026-07-19", label: "Dom 19" }
  ],
  WHATSAPP_NUMBER: "18495911666"
};

let password = sessionStorage.getItem('h18_admin_pw') || '';
let currentDate = CONFIG.DATES[0].value;
let reservations = [];

/* ---------- Login ---------- */
const loginScreen = document.getElementById('loginScreen');
const appScreen = document.getElementById('appScreen');

function tryLogin(pw, silent){
  password = pw;
  loadReservations().then(ok => {
    if (ok) {
      sessionStorage.setItem('h18_admin_pw', pw);
      loginScreen.style.display = 'none';
      appScreen.style.display = 'block';
    } else {
      // La contraseña guardada del navegador ya no sirve (por ejemplo, si se
      // cambio en Apps Script): la borramos para no reintentar sola en cada carga.
      sessionStorage.removeItem('h18_admin_pw');
      password = '';
      if (!silent) {
        document.getElementById('loginError').textContent = 'Contraseña incorrecta o backend no conectado.';
      }
    }
  });
}

document.getElementById('loginBtn').addEventListener('click', () => {
  tryLogin(document.getElementById('passwordInput').value);
});
document.getElementById('passwordInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') tryLogin(e.target.value);
});
document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('h18_admin_pw');
  location.reload();
});

if (password) tryLogin(password, true);

/* ---------- Date tabs ---------- */
const dateTabs = document.getElementById('dateTabs');
CONFIG.DATES.forEach(d => {
  const [dayName, dayNum] = d.label.split(' ');
  const btn = document.createElement('button');
  btn.className = 'date-tab' + (d.value === currentDate ? ' active' : '');
  btn.innerHTML = `<span class="tab-name">${dayName}</span><span class="tab-num">${dayNum}</span>`;
  btn.addEventListener('click', () => {
    currentDate = d.value;
    [...dateTabs.children].forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    loadReservations();
  });
  dateTabs.appendChild(btn);
});

document.getElementById('searchBox').addEventListener('input', renderList);

/* ---------- Data ---------- */
let requestSeq = 0;

async function loadReservations(){
  const seq = ++requestSeq;
  const requestedDate = currentDate;
  document.getElementById('resList').innerHTML = '<div class="empty-state">Cargando reservas...</div>';
  try{
    const res = await fetch(`/api/reservations?date=${requestedDate}&password=${encodeURIComponent(password)}`);
    const data = await res.json();
    // Si mientras esperabamos esta respuesta ya se pidio otra fecha, la descartamos.
    if (seq !== requestSeq) return false;
    if (!data.ok) return false;
    reservations = data.reservations;
    renderStats();
    renderList();
    return true;
  }catch(e){
    console.error('loadReservations fallo:', e);
    return false;
  }
}

function renderStats(){
  document.getElementById('statTotal').textContent = reservations.length;
  document.getElementById('statGuests').textContent = reservations.reduce((sum, r) => sum + Number(r.guests), 0);
  document.getElementById('statCheckedIn').textContent = reservations.filter(r => r.checkedIn).length;
}

function renderList(){
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const list = document.getElementById('resList');
  const filtered = reservations.filter(r => r.fullName.toLowerCase().includes(q));

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">No hay reservas para este filtro todavía.</div>';
    return;
  }

  list.innerHTML = filtered
    .sort((a,b) => a.time.localeCompare(b.time))
    .map(r => `
      <div class="res-card ${r.checkedIn ? 'checked-in' : ''}">
        <div class="res-main">
          <div class="res-name">${r.fullName}</div>
          <div class="res-meta">${r.time} · ${r.seatTypeLabel} · ${r.guests} personas · ${r.code}</div>
        </div>
        <div class="res-actions">
          <a class="icon-btn wa" href="https://wa.me/${String(r.phone||'').replace(/[^0-9]/g,'')}" target="_blank" rel="noopener" aria-label="WhatsApp">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.36 5.07L2 22l5.06-1.33A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.64 0-3.16-.47-4.45-1.28l-.32-.19-3.11.82.83-3.04-.21-.31A7.94 7.94 0 014 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8z"/></svg>
          </a>
          <button class="checkin-btn ${r.checkedIn ? 'done' : ''}" onclick="toggleCheckin('${r.code}')">
            ${r.checkedIn ? '✓ Llegó' : 'Check-in'}
          </button>
        </div>
      </div>
    `).join('');
}

async function toggleCheckin(code){
  const r = reservations.find(x => x.code === code);
  if (!r) return;
  const previousState = r.checkedIn;

  // Actualizacion optimista: se ve al toque en pantalla: se confirma (o se
  // revierte) con el servidor despues, que en Apps Script siempre tarda unos
  // segundos en responder sin importar que tan liviano sea el codigo.
  r.checkedIn = !previousState;
  renderStats();
  renderList();

  try{
    const res = await fetch('/api/checkin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, password })
    });
    const data = await res.json();
    if (data.ok) {
      r.checkedIn = data.checkedIn;
      renderStats();
      renderList();
      showToast(data.checkedIn ? 'Check-in registrado' : 'Check-in revertido');
    } else {
      r.checkedIn = previousState;
      renderStats();
      renderList();
      showToast('No se pudo actualizar');
    }
  }catch(e){
    r.checkedIn = previousState;
    renderStats();
    renderList();
    showToast('Error de conexión');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
</script>
</body>
</html>
